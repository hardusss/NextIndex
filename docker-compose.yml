version: '3.8'

services:
  # Mysql database
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: indexer_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    # Checking db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 10s
      retries: 5

  # API
  indexer:
    build: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=mysql://root:root@db:3306/indexer_db
      - RPC_URL=${RPC_URL}
      - PROGRAM_ID=${PROGRAM_ID}
      - IDL_ADDRESS=${IDL_ADDRESS}
    depends_on:
      db:
        condition: service_healthy 

volumes:
  mysql_data: